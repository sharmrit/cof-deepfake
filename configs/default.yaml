# =============================================================================
# COF-UQ Default Configuration — TIFS Extended Version
# =============================================================================
# Update dataset paths before running experiments.

data:
  ff_root: "datasets/FaceForensics"
  celebdf_root: "datasets/CelebDF"
  dfdc_root: "datasets/DFDC"
  image_size: 224
  num_workers: 8
  max_samples_per_class: 50000    # null = use all available samples

train:
  batch_size: 128
  epochs: 30
  lr: 1.0e-4
  weight_decay: 4.0e-4
  scheduler: "cosine"            # cosine | step | plateau
  warmup_epochs: 3
  early_stopping_patience: 7
  label_smoothing: 0.0
  balanced_sampling: true
  mc_dropout_rate: 0.3
  mc_forward_passes: 30
  freeze_backbone_epochs: 0

fusion:
  optimizer: "SLSQP"
  max_iter: 1000
  tolerance: 1.0e-10
  n_restarts: 10
  constraint_type: "simplex"     # simplex | non_negative
  regularization: 0.0

eval:
  n_bootstrap: 1000
  confidence_level: 0.95
  conformal_alpha: 0.1
  calibration_bins: 15

hessian:
  n_eigenvalues: 20
  batch_size: 128
  tol: 1.0e-4

nested_cv:
  outer_folds: 5
  inner_folds: 3
  stratified: true

# Global settings
architectures:
  - xception
  - resnet50
  - resnet101
  - efficientnet_b0
  - efficientnet_b4
  - efficientnet_v2_s
  - vit_base_patch16_224
  - deit_base_patch16_224
  - swin_base_patch4_window7_224
  - convnext_base
  - maxvit_base_tf_224

seeds:
  - 42
  - 43
  - 44
  - 45
  - 46

device: "cuda"
output_dir: "./results"
figure_dir: "./figures"
checkpoint_dir: "./checkpoints"
log_dir: "./logs"
