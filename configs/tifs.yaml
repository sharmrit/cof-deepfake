# =============================================================================
# COF-UQ Configuration — TIFS Submission (Optimized)
# =============================================================================

data:
  ff_root: "datasets/FaceForensics"
  celebdf_root: "datasets/CelebDF"
  dfdc_root: "datasets/DFDC"
  image_size: 224
  num_workers: 8
  max_samples_per_class: 100000   # 200K total per split

train:
  batch_size: 64
  epochs: 50
  lr: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping_patience: 15
  label_smoothing: 0.0
  balanced_sampling: true
  mc_dropout_rate: 0.5            # CRITICAL: matches paper pd=0.5
  mc_forward_passes: 20           # matches paper T=20
  freeze_backbone_epochs: 0

fusion:
  optimizer: "SLSQP"
  max_iter: 1000
  tolerance: 1.0e-10
  n_restarts: 20                  # more restarts for stability
  constraint_type: "simplex"
  regularization: 0.0

eval:
  n_bootstrap: 1000
  confidence_level: 0.95
  conformal_alpha: 0.1
  calibration_bins: 15

hessian:
  n_eigenvalues: 20
  batch_size: 128
  tol: 1.0e-4

nested_cv:
  outer_folds: 5
  inner_folds: 3
  stratified: true

architectures:
  - xception
  - resnet50
  - resnet101
  - efficientnet_b0
  - efficientnet_b4
  - efficientnet_v2_s
  - vit_base_patch16_224
  - deit_base_patch16_224
  - swin_base_patch4_window7_224
  - convnext_base
  - maxvit_base_tf_224

seeds:
  - 42
  - 43
  - 44
  - 45
  - 46

device: "cuda"
output_dir: "./results_v2"
figure_dir: "./figures_v2"
checkpoint_dir: "./checkpoints_v2"
log_dir: "./logs_v2"
